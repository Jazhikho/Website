name: Sync Itch Devlogs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync itch devlogs
        run: python scripts/sync_itch_devlogs.py

      - name: Commit and push updates
        run: |
          if git diff --quiet -- content/itch-devlog.json; then
            echo "No devlog changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/itch-devlog.json
          git commit -m "chore: sync itch devlogs"
          git push
